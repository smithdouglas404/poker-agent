<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body{width:230px;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#1a1a2e;background:#fff;margin:0}
  h2{font-size:14px;margin:0 0 10px;color:#4f46e5}
  .status{font-size:12px;color:#666;margin-bottom:10px;padding:6px 8px;background:#f8f8ff;border-radius:6px;border:1px solid #e8e8f8}
  .status .ok{color:#22c55e;font-weight:600}
  .status .grey{color:#9ca3af}
  .inject-btn{width:100%;padding:9px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;background:#4f46e5;color:#fff;margin-bottom:8px;transition:background .15s}
  .inject-btn:hover{background:#6366f1}
  button.reset{width:100%;padding:7px;border:1px solid #fee2e2;background:#fff;color:#991b1b;border-radius:8px;font-size:12px;cursor:pointer;margin-bottom:6px}
  button.reset:hover{background:#fee2e2}
  .note{font-size:11px;color:#9ca3af;line-height:1.6;margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .dot.green{background:#22c55e}.dot.grey{background:#9ca3af}
</style>
</head>
<body>
<h2>♠ PokerNow Advisor</h2>
<div class="status" id="status">Checking…</div>

<button class="inject-btn" id="injectBtn">▶ Show Overlay on Table</button>
<button class="reset" id="resetBtn">Clear saved model</button>

<div class="note">
  <strong>If the overlay isn't showing:</strong><br>
  1. Make sure you're on pokernow.club<br>
  2. Click "Show Overlay on Table" above<br>
  3. Then upload your log CSV in the overlay
</div>
<script src="popup.js"></script>
</body>
</html>
